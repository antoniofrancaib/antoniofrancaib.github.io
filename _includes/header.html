<header>
    <!-- Nav Bar -->
    <nav id="navbar" class="navbar navbar-light navbar-expand-sm fixed-top">
      <div class="container">
        <a class="navbar-brand title font-weight-lighter" href="{{ site.baseurl }}/">{{ site.title }}</a>
        <!-- Navbar Toggle -->
        <button class="navbar-toggler collapsed ml-auto" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar top-bar"></span>
          <span class="icon-bar middle-bar"></span>
          <span class="icon-bar bottom-bar"></span>
        </button>
        <div class="collapse navbar-collapse text-right" id="navbarNav">
          <ul class="navbar-nav ml-auto flex-nowrap">
            <!-- About -->
            <li class="nav-item {% if page.url == '/' %}active{% endif %}">
              <a class="nav-link" href="{{ '/' | relative_url }}">About</a>
            </li>
            {% for link in site.data.navigation.main %}
              <li class="nav-item {% if page.url == link.url %}active{% endif %}">
                <a class="nav-link" href="{{ link.url | relative_url }}">{{ link.title }}</a>
              </li>
            {% endfor %}
            <!-- Toogle theme mode -->
            <div class="toggle-container">
              <a id="light-toggle">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
              </a>
            </div>
          </ul>
        </div>
      </div>
    </nav>
  </header>
